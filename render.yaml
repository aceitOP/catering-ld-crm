databases:
  - name: catering-ld-db
    databaseName: catering_ld
    user: catering
    plan: free

services:
  # Backend API (Node.js)
  - type: web
    name: catering-ld-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: catering-ld-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://catering-ld-frontend.onrender.com
      - key: SENTRY_DSN
        value: https://e88e0972ff604a64a74e09c206ae1fb8@sentry.dev01.aceit.dev/2
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: 0.1
      - key: DB_SEED_MODE
        value: empty
      - key: SUPER_ADMIN_EMAIL
        value: pomykal@aceit.cz
      - key: SUPER_ADMIN_FIRST_NAME
        value: Super
      - key: SUPER_ADMIN_LAST_NAME
        value: Admin
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: 15

  # Frontend (staticky web)
  - type: web
    name: catering-ld-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l 10000
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://catering-ld-backend.onrender.com/api
      - key: VITE_SENTRY_DSN
        value: https://e88e0972ff604a64a74e09c206ae1fb8@sentry.dev01.aceit.dev/2
      - key: VITE_SENTRY_ENVIRONMENT
        value: production
      - key: VITE_SENTRY_TRACES_SAMPLE_RATE
        value: 0.1
