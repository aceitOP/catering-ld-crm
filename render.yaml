databases:
  - name: catering-ld-db
    databaseName: catering_ld
    user: catering
    plan: free

services:
  # Backend API (Node.js)
  - type: web
    name: catering-ld-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: catering-ld-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://catering-ld-frontend.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: 25

  # Frontend (staticky web)
  - type: web
    name: catering-ld-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l 10000
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://catering-ld-backend.onrender.com
