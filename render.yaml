databases:
  - name: catering-ld-db
    databaseName: catering_ld
    user: catering
    plan: free

services:
  # ── Backend API ───────────────────────────────────────────
  - type: web
    name: catering-ld-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: catering-ld-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://catering-ld-frontend.onrender.com  # změňte na váš URL frontendu
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: 25

  # ── Frontend ──────────────────────────────────────────────
  - type: web
    name: catering-ld-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://catering-ld-backend.onrender.com  # změňte na váš URL backendu
